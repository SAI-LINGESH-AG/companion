<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Soulmate — AI Companion</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💜</text></svg>" />
</head>
<body>

<div class="auth-wrap">
  <div class="auth-card">

    <div class="auth-logo">
      <div class="logo-icon">💜</div>
      <h1>Soulmate</h1>
      <p>Your AI companion, always here for you</p>
    </div>

    <div class="auth-tabs">
      <button class="tab-btn active" onclick="switchTab('signin')">Sign In</button>
      <button class="tab-btn" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <!-- SIGN IN -->
    <div id="signinForm">
      <div class="auth-form">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="siEmail" placeholder="you@email.com" autocomplete="email" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="siPass" placeholder="••••••••" autocomplete="current-password" />
        </div>
        <p class="err-msg" id="siErr"></p>
        <button class="btn-primary" onclick="signIn()">Sign In</button>
        <div class="auth-footer">
          <a href="#" onclick="switchTab('forgot')">Forgot password?</a>
        </div>
      </div>
    </div>

    <!-- SIGN UP -->
    <div id="signupForm" style="display:none">
      <div class="auth-form">
        <div class="form-group">
          <label>Your Name</label>
          <input type="text" id="suName" placeholder="What should your companion call you?" autocomplete="name" />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="suEmail" placeholder="you@email.com" autocomplete="email" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="suPass" placeholder="Min 6 characters" autocomplete="new-password" />
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" id="suPass2" placeholder="Repeat password" autocomplete="new-password" />
        </div>
        <p class="err-msg" id="suErr"></p>
        <button class="btn-primary" onclick="signUp()">Create Account</button>
        <div class="auth-footer">
          Already have an account? <a href="#" onclick="switchTab('signin')">Sign In</a>
        </div>
      </div>
    </div>

    <!-- FORGOT PASSWORD -->
    <div id="forgotForm" style="display:none">
      <div class="auth-form">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="fpEmail" placeholder="you@email.com" autocomplete="email" />
        </div>
        <p class="err-msg" id="fpErr"></p>
        <p class="success-msg" id="fpOk"></p>
        <button class="btn-primary" onclick="resetPassword()">Send Reset Link</button>
        <div class="auth-footer">
          Remembered? <a href="#" onclick="switchTab('signin')">Sign In</a>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendPasswordResetEmail, onAuthStateChanged, updateProfile }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, getDoc }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // 🔧 REPLACE with your Firebase config
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_PROJECT.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId: "YOUR_APP_ID"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // Auto-redirect if already logged in
  onAuthStateChanged(auth, async (user) => {
    if (user) {
      const snap = await getDoc(doc(db, "companions", user.uid));
      if (snap.exists()) {
        window.location.href = "chat.html";
      } else {
        window.location.href = "setup.html";
      }
    }
  });

  window.switchTab = (tab) => {
    ["signinForm","signupForm","forgotForm"].forEach(id => {
      document.getElementById(id).style.display = "none";
    });
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));

    if (tab === "signin") {
      document.getElementById("signinForm").style.display = "";
      document.querySelectorAll(".tab-btn")[0].classList.add("active");
    } else if (tab === "signup") {
      document.getElementById("signupForm").style.display = "";
      document.querySelectorAll(".tab-btn")[1].classList.add("active");
    } else {
      document.getElementById("forgotForm").style.display = "";
    }
  };

  window.signIn = async () => {
    const email = document.getElementById("siEmail").value.trim();
    const pass  = document.getElementById("siPass").value;
    const err   = document.getElementById("siErr");
    err.textContent = "";
    if (!email || !pass) { err.textContent = "Please fill in all fields."; return; }
    try {
      await signInWithEmailAndPassword(auth, email, pass);
    } catch(e) {
      err.textContent = friendlyError(e.code);
    }
  };

  window.signUp = async () => {
    const name  = document.getElementById("suName").value.trim();
    const email = document.getElementById("suEmail").value.trim();
    const pass  = document.getElementById("suPass").value;
    const pass2 = document.getElementById("suPass2").value;
    const err   = document.getElementById("suErr");
    err.textContent = "";
    if (!name || !email || !pass || !pass2) { err.textContent = "Please fill in all fields."; return; }
    if (pass !== pass2) { err.textContent = "Passwords do not match."; return; }
    if (pass.length < 6) { err.textContent = "Password must be at least 6 characters."; return; }
    try {
      const cred = await createUserWithEmailAndPassword(auth, email, pass);
      await updateProfile(cred.user, { displayName: name });
      window.location.href = "setup.html";
    } catch(e) {
      err.textContent = friendlyError(e.code);
    }
  };

  window.resetPassword = async () => {
    const email = document.getElementById("fpEmail").value.trim();
    const err = document.getElementById("fpErr");
    const ok  = document.getElementById("fpOk");
    err.textContent = ""; ok.textContent = "";
    if (!email) { err.textContent = "Enter your email address."; return; }
    try {
      await sendPasswordResetEmail(auth, email);
      ok.textContent = "Reset link sent! Check your inbox.";
    } catch(e) {
      err.textContent = friendlyError(e.code);
    }
  };

  function friendlyError(code) {
    const map = {
      "auth/user-not-found": "No account found with this email.",
      "auth/wrong-password": "Incorrect password.",
      "auth/email-already-in-use": "This email is already registered.",
      "auth/invalid-email": "Please enter a valid email.",
      "auth/weak-password": "Password is too weak.",
      "auth/too-many-requests": "Too many attempts. Try again later.",
      "auth/invalid-credential": "Incorrect email or password.",
    };
    return map[code] || "Something went wrong. Please try again.";
  }

  // Enter key support
  document.addEventListener("keydown", (e) => {
    if (e.key !== "Enter") return;
    if (document.getElementById("signinForm").style.display !== "none") signIn();
    else if (document.getElementById("signupForm").style.display !== "none") signUp();
    else if (document.getElementById("forgotForm").style.display !== "none") resetPassword();
  });
</script>
</body>
</html>
