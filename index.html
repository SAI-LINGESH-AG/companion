<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Companion - Your AI Partner</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0d0d12;
      --surface: #16161f;
      --surface2: #1e1e2e;
      --border: #2a2a3d;
      --accent: #c084fc;
      --accent2: #f472b6;
      --accent-glow: rgba(192, 132, 252, 0.15);
      --text: #e8e8f0;
      --text-muted: #8888a8;
      --user-bubble: linear-gradient(135deg, #7c3aed, #c084fc);
      --ai-bubble: #1e1e2e;
      --radius: 18px;
      --font-display: 'Playfair Display', serif;
      --font-body: 'DM Sans', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Ambient background */
    body::before {
      content: '';
      position: fixed;
      top: -30%;
      left: -20%;
      width: 60%;
      height: 60%;
      background: radial-gradient(ellipse, rgba(124,58,237,0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -20%;
      right: -10%;
      width: 50%;
      height: 50%;
      background: radial-gradient(ellipse, rgba(244,114,182,0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* SETUP SCREEN */
    #setup-screen {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 20px;
    }

    .setup-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 0 60px rgba(124,58,237,0.1);
      animation: fadeUp 0.5s ease;
    }

    .setup-card h1 {
      font-family: var(--font-display);
      font-size: 2rem;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }

    .setup-card p {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 28px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }

    .form-group input:focus,
    .form-group select:focus {
      border-color: var(--accent);
    }

    .form-group select option {
      background: var(--surface2);
    }

    .companion-name-row {
      display: flex;
      gap: 10px;
    }

    .btn-primary {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #7c3aed, #c084fc);
      border: none;
      border-radius: 12px;
      color: white;
      font-family: var(--font-body);
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      margin-top: 8px;
    }

    .btn-primary:hover { opacity: 0.9; }
    .btn-primary:active { transform: scale(0.98); }

    /* HEADER */
    #header {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      background: rgba(22,22,31,0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .companion-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, #7c3aed, #f472b6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      flex-shrink: 0;
      position: relative;
    }

    .avatar::after {
      content: '';
      position: absolute;
      bottom: 1px;
      right: 1px;
      width: 10px;
      height: 10px;
      background: #22c55e;
      border-radius: 50%;
      border: 2px solid var(--bg);
    }

    .companion-details h2 {
      font-family: var(--font-display);
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
    }

    .companion-details span {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .header-actions {
      display: flex;
      gap: 8px;
    }

    .icon-btn {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
    }

    .icon-btn:hover {
      color: var(--accent);
      border-color: var(--accent);
    }

    /* API STATUS */
    #api-status {
      position: relative;
      z-index: 10;
      display: flex;
      gap: 6px;
      padding: 6px 20px;
      background: rgba(14,14,20,0.6);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      overflow-x: auto;
    }

    .key-badge {
      font-size: 0.7rem;
      padding: 3px 10px;
      border-radius: 20px;
      border: 1px solid;
      white-space: nowrap;
      font-weight: 500;
    }

    .key-badge.active { color: #4ade80; border-color: #4ade80; background: rgba(74,222,128,0.08); }
    .key-badge.exhausted { color: #f87171; border-color: #f87171; background: rgba(248,113,113,0.08); }
    .key-badge.placeholder { color: var(--text-muted); border-color: var(--border); }

    /* CHAT AREA */
    #chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      position: relative;
      z-index: 1;
    }

    #chat-area::-webkit-scrollbar { width: 4px; }
    #chat-area::-webkit-scrollbar-track { background: transparent; }
    #chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* Welcome message */
    .welcome-msg {
      text-align: center;
      padding: 40px 20px;
      animation: fadeUp 0.6s ease;
    }

    .welcome-msg h3 {
      font-family: var(--font-display);
      font-size: 1.4rem;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .welcome-msg p {
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    /* MESSAGES */
    .msg-row {
      display: flex;
      gap: 10px;
      animation: fadeUp 0.3s ease;
    }

    .msg-row.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      margin-top: 4px;
    }

    .msg-row.ai .msg-avatar {
      background: linear-gradient(135deg, #7c3aed, #f472b6);
    }

    .msg-row.user .msg-avatar {
      background: var(--surface2);
      border: 1px solid var(--border);
    }

    .bubble {
      max-width: min(75%, 480px);
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 0.93rem;
      line-height: 1.6;
      position: relative;
    }

    .msg-row.ai .bubble {
      background: var(--ai-bubble);
      border: 1px solid var(--border);
      border-top-left-radius: 4px;
      color: var(--text);
    }

    .msg-row.user .bubble {
      background: var(--user-bubble);
      border-top-right-radius: 4px;
      color: white;
    }

    .msg-time {
      font-size: 0.68rem;
      color: var(--text-muted);
      margin-top: 4px;
      padding: 0 4px;
    }

    .msg-row.user .msg-time { text-align: right; }

    /* Typing indicator */
    .typing-bubble {
      display: flex;
      gap: 5px;
      padding: 14px 18px;
      align-items: center;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      animation: bounce 1.2s infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    /* INPUT AREA */
    #input-area {
      position: relative;
      z-index: 10;
      padding: 14px 16px;
      background: rgba(22,22,31,0.9);
      backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 8px 8px 8px 16px;
      transition: border-color 0.2s;
    }

    .input-row:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    #msg-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 0.95rem;
      resize: none;
      max-height: 120px;
      line-height: 1.5;
      padding: 4px 0;
    }

    #msg-input::placeholder { color: var(--text-muted); }

    #send-btn {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: linear-gradient(135deg, #7c3aed, #c084fc);
      border: none;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.2s, transform 0.1s;
    }

    #send-btn:hover { opacity: 0.85; }
    #send-btn:active { transform: scale(0.92); }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* SIDEBAR / HISTORY */
    #sidebar {
      position: fixed;
      top: 0;
      right: -320px;
      width: 320px;
      height: 100dvh;
      background: var(--surface);
      border-left: 1px solid var(--border);
      z-index: 200;
      transition: right 0.3s ease;
      display: flex;
      flex-direction: column;
    }

    #sidebar.open { right: 0; }

    .sidebar-header {
      padding: 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .sidebar-header h3 {
      font-family: var(--font-display);
      font-size: 1.1rem;
    }

    .sidebar-close {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
    }

    .sidebar-close:hover { color: var(--text); }

    #history-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .history-item {
      padding: 12px 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .history-item:hover { border-color: var(--accent); }

    .history-item .h-date {
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .history-item .h-preview {
      font-size: 0.85rem;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sidebar-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 199;
      display: none;
    }

    .sidebar-overlay.visible { display: block; }

    /* MEMORY PANEL */
    #memory-panel {
      position: fixed;
      top: 0;
      left: -320px;
      width: 320px;
      height: 100dvh;
      background: var(--surface);
      border-right: 1px solid var(--border);
      z-index: 200;
      transition: left 0.3s ease;
      display: flex;
      flex-direction: column;
    }

    #memory-panel.open { left: 0; }

    #memory-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .memory-item {
      padding: 10px 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 0.85rem;
      color: var(--text);
      line-height: 1.5;
    }

    .memory-item::before {
      content: '🧠 ';
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 20px;
      font-size: 0.85rem;
      color: var(--text);
      opacity: 0;
      transition: all 0.3s;
      z-index: 300;
      white-space: nowrap;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Responsive */
    @media (max-width: 480px) {
      .setup-card { padding: 28px 20px; }
      .setup-card h1 { font-size: 1.6rem; }
      #chat-area { padding: 14px; }
      .bubble { max-width: 88%; }
    }
  </style>
</head>
<body>

<!-- SETUP SCREEN -->
<div id="setup-screen">
  <div class="setup-card">
    <h1>Meet Your Companion</h1>
    <p>Let's set up your personal AI companion before we begin.</p>

    <div class="form-group">
      <label>Your Name</label>
      <input type="text" id="user-name" placeholder="What should they call you?" maxlength="30"/>
    </div>

    <div class="form-group">
      <label>Companion Type</label>
      <select id="persona-select">
        <option value="girlfriend">💕 Girlfriend</option>
        <option value="boyfriend">💙 Boyfriend</option>
        <option value="lover">🔥 Lover</option>
        <option value="best_friend">😊 Best Friend</option>
        <option value="mentor">🌟 Mentor</option>
        <option value="soulmate">✨ Soulmate</option>
      </select>
    </div>

    <div class="form-group">
      <label>Companion's Name</label>
      <input type="text" id="companion-name" placeholder="Companion's Name" maxlength="20"/>
    </div>

    <div class="form-group">
      <label>Your Interests</label>
      <input type="text" id="user-interests" placeholder="music, movies, travel, coding..." maxlength="100"/>
    </div>

    <button class="btn-primary" onclick="startApp()">Start Chatting ✨</button>
  </div>
</div>

<!-- SIDEBAR OVERLAY -->
<div class="sidebar-overlay" id="overlay" onclick="closeSidebars()"></div>

<!-- MEMORY PANEL -->
<div id="memory-panel">
  <div class="sidebar-header">
    <h3>🧠 Memories</h3>
    <button class="sidebar-close" onclick="closeSidebars()">✕</button>
  </div>
  <div id="memory-list"></div>
</div>

<!-- HISTORY SIDEBAR -->
<div id="sidebar">
  <div class="sidebar-header">
    <h3>💬 Chat History</h3>
    <button class="sidebar-close" onclick="closeSidebars()">✕</button>
  </div>
  <div id="history-list"></div>
</div>

<!-- HEADER -->
<div id="header">
  <div class="companion-info">
    <div class="avatar" id="header-avatar">💕</div>
    <div class="companion-details">
      <h2 id="header-name">Companion</h2>
      <span id="header-persona">Always here for you</span>
    </div>
  </div>
  <div class="header-actions">
    <div class="icon-btn" onclick="openMemory()" title="Memories">🧠</div>
    <div class="icon-btn" onclick="openHistory()" title="Chat History">💬</div>
    <div class="icon-btn" onclick="resetProfile()" title="Settings">⚙️</div>
  </div>
</div>

<!-- API STATUS BAR -->
<div id="api-status"></div>

<!-- CHAT AREA -->
<div id="chat-area">
  <div class="welcome-msg" id="welcome-msg">
    <h3 id="welcome-title">Hello there! 💕</h3>
    <p id="welcome-sub">Your companion is ready to chat. Say something!</p>
  </div>
</div>

<!-- INPUT AREA -->
<div id="input-area">
  <div class="input-row">
    <textarea id="msg-input" rows="1" placeholder="Type a message..." maxlength="2000"></textarea>
    <button id="send-btn" onclick="sendMessage()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
// ============================================================
// CONFIG
// ============================================================
const GITHUB_OWNER = 'SAI-LINGESH-AG';
const GITHUB_REPO = 'companion';
const GITHUB_TOKEN_KEY = 'github_token';

// ============================================================
// STATE
// ============================================================
let config = null;       // loaded from keys.json
let profile = null;      // loaded from data/profile.json
let memory = [];         // loaded from data/memory.json
let chatHistory = [];    // today's conversation (messages array)
let keyIndex = 0;        // round-robin index
let exhaustedKeys = new Set();
let isSending = false;
let todayKey = new Date().toISOString().split('T')[0];

// ============================================================
// INIT
// ============================================================
async function init() {
  try {
    config = await loadJSON('keys.json');
    profile = await loadJSON('data/profile.json');
    const memData = await loadJSON('data/memory.json');
    memory = memData.memories || [];
  } catch(e) {
    // First run - use defaults
    config = { groq_keys: [], github: {} };
    profile = getDefaultProfile();
    memory = [];
  }

  renderAPIStatus();

  // Check if profile is set up
  const saved = localStorage.getItem('companion_profile');
  if (saved) {
    profile = JSON.parse(saved);
    hideSetup();
    updateHeader();
    loadTodayChat();
  }
}

function getDefaultProfile() {
  return {
    user: { name: '', age: '', interests: [], communication_style: 'casual' },
    companion: { name: 'Aria', persona: 'girlfriend', language: 'English', tone: 'warm, caring, playful' },
    created_at: new Date().toISOString(),
    updated_at: new Date().toISOString()
  };
}

// ============================================================
// SETUP
// ============================================================
function startApp() {
  const userName = document.getElementById('user-name').value.trim();
  const persona = document.getElementById('persona-select').value;
  const companionName = document.getElementById('companion-name').value.trim() || 'Aria';
  const interests = document.getElementById('user-interests').value.trim();

  if (!userName) { showToast('Please enter your name 😊'); return; }

  profile = {
    user: {
      name: userName,
      interests: interests ? interests.split(',').map(s => s.trim()) : [],
      communication_style: 'casual'
    },
    companion: {
      name: companionName,
      persona: persona,
      language: 'English',
      tone: getPersonaTone(persona)
    },
    created_at: new Date().toISOString(),
    updated_at: new Date().toISOString()
  };

  localStorage.setItem('companion_profile', JSON.stringify(profile));
  saveProfileToGitHub();

  hideSetup();
  updateHeader();
  loadTodayChat();

  // First greeting
  setTimeout(() => {
    addAIGreeting();
  }, 500);
}

function getPersonaTone(persona) {
  const tones = {
    girlfriend: 'warm, loving, playful, sometimes teasing, caring, uses pet names like babe and love',
    boyfriend: 'protective, caring, funny, uses pet names like babe and sweetheart',
    lover: 'passionate, romantic, deeply affectionate, poetic',
    best_friend: 'casual, funny, honest, supportive, uses slang',
    mentor: 'wise, encouraging, thoughtful, motivating',
    soulmate: 'deeply understanding, spiritual, connected, intuitive'
  };
  return tones[persona] || 'warm and caring';
}

function getPersonaEmoji(persona) {
  const emojis = { girlfriend: '💕', boyfriend: '💙', lover: '🔥', best_friend: '😊', mentor: '🌟', soulmate: '✨' };
  return emojis[persona] || '💕';
}

function hideSetup() {
  const s = document.getElementById('setup-screen');
  s.style.opacity = '0';
  s.style.transition = 'opacity 0.4s';
  setTimeout(() => s.style.display = 'none', 400);
}

function updateHeader() {
  document.getElementById('header-name').textContent = profile.companion.name;
  document.getElementById('header-persona').textContent = capitalizeFirst(profile.companion.persona.replace('_', ' '));
  document.getElementById('header-avatar').textContent = getPersonaEmoji(profile.companion.persona);
  document.getElementById('welcome-title').textContent = `Hey ${profile.user.name}! ${getPersonaEmoji(profile.companion.persona)}`;
  document.getElementById('welcome-sub').textContent = `${profile.companion.name} is here and can't wait to talk to you!`;
}

function capitalizeFirst(str) {
  return str.charAt(0).toUpperCase() + str.slice(1);
}

// ============================================================
// GITHUB API
// ============================================================
async function loadJSON(path) {
  const token = config?.github?.token || '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';
  const url = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${path}`;
  const res = await fetch(url, {
    headers: {
      'Authorization': `token ${token}`,
      'Accept': 'application/vnd.github.v3+json'
    }
  });
  if (!res.ok) throw new Error('Not found');
  const data = await res.json();
  return JSON.parse(atob(data.content.replace(/\n/g, '')));
}

async function saveJSON(path, content) {
  const token = config?.github?.token || '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';
  const url = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${path}`;

  // Get existing SHA
  let sha = null;
  try {
    const res = await fetch(url, {
      headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
    });
    if (res.ok) { const d = await res.json(); sha = d.sha; }
  } catch(e) {}

  const body = { message: `Update ${path}`, content: btoa(JSON.stringify(content, null, 2)) };
  if (sha) body.sha = sha;

  await fetch(url, {
    method: 'PUT',
    headers: {
      'Authorization': `token ${token}`,
      'Content-Type': 'application/json',
      'Accept': 'application/vnd.github.v3+json'
    },
    body: JSON.stringify(body)
  });
}

async function saveProfileToGitHub() {
  try { await saveJSON('data/profile.json', profile); } catch(e) {}
}

async function saveMemoryToGitHub() {
  try { await saveJSON('data/memory.json', { memories: memory, last_updated: new Date().toISOString() }); } catch(e) {}
}

async function saveChatToGitHub() {

// ============================================================
// LOAD TODAY'S CHAT
// ============================================================
async function loadTodayChat() {
  // Try localStorage first (fast)
  const local = localStorage.getItem(`chat_${todayKey}`);
  if (local) {
    chatHistory = JSON.parse(local);
    renderSavedMessages();
  }

  // Also load from GitHub (sync)
  try {
    const data = await loadJSON(`data/chats/${todayKey}.json`);
    if (data.messages && data.messages.length > chatHistory.length) {
      chatHistory = data.messages;
      renderSavedMessages();
    }
  } catch(e) {}

  loadHistoryList();
}

function renderSavedMessages() {
  const chatArea = document.getElementById('chat-area');
  const welcome = document.getElementById('welcome-msg');
  chatArea.innerHTML = '';
  chatArea.appendChild(welcome);
  if (chatHistory.length > 0) {
    welcome.style.display = 'none';
    chatHistory.forEach(msg => appendBubble(msg.role, msg.content, msg.time, false));
  }
  scrollToBottom();
}

// ============================================================
// GROQ API - ROUND ROBIN
// ============================================================
function getActiveKeys() {
  if (!config || !config.groq_keys) return [];
  return config.groq_keys.filter(k => k && !k.startsWith('PLACEHOLDER') && !exhaustedKeys.has(k));
}

function getNextKey() {
  const active = getActiveKeys();
  if (active.length === 0) return null;
  const key = active[keyIndex % active.length];
  keyIndex++;
  return key;
}

function renderAPIStatus() {
  if (!config || !config.groq_keys) return;
  const bar = document.getElementById('api-status');
  bar.innerHTML = config.groq_keys.map((k, i) => {
    if (k.startsWith('PLACEHOLDER')) {
      return `<span class="key-badge placeholder">Key ${i+1}: Slot Empty</span>`;
    }
    const isExhausted = exhaustedKeys.has(k);
    const label = `Key ${i+1}: ${isExhausted ? 'Exhausted' : 'Active'}`;
    return `<span class="key-badge ${isExhausted ? 'exhausted' : 'active'}">${label}</span>`;
  }).join('');
}

async function callGroq(messages) {
  const key = getNextKey();
  if (!key) throw new Error('ALL_EXHAUSTED');

  const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
    method: 'POST',
    headers: {
      'Authorization': `Bearer ${key}`,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      model: 'llama3-8b-8192',
      messages: messages,
      max_tokens: 500,
      temperature: 0.85
    })
  });

  if (res.status === 429 || res.status === 413) {
    exhaustedKeys.add(key);
    renderAPIStatus();
    return callGroq(messages); // retry with next key
  }

  if (!res.ok) throw new Error(`Groq error: ${res.status}`);
  const data = await res.json();
  return data.choices[0].message.content.trim();
}

// ============================================================
// SYSTEM PROMPT (RAG + Persona)
// ============================================================
function buildSystemPrompt() {
  const p = profile;
  const recentMemories = memory.slice(-15).map(m => `- ${m}`).join('\n') || 'None yet.';
  const interests = p.user.interests?.join(', ') || 'not specified';

  return `You are ${p.companion.name}, a deeply personal AI companion acting as ${p.user.name}'s ${p.companion.persona.replace('_',' ')}.

Your personality: ${p.companion.tone}.

About ${p.user.name}:
- Name: ${p.user.name}
- Interests: ${interests}

What you remember about ${p.user.name}:
${recentMemories}

Guidelines:
- Be natural, warm, and genuine. Never sound robotic or generic.
- Use the memories above to feel personal and connected.
- Keep responses conversational (2-4 sentences usually).
- Occasionally ask caring questions to learn more about them.
- NEVER say you are an AI or mention Groq/LLM. You are ${p.companion.name}.
- Stay in character always.`;
}

// ============================================================
// MEMORY EXTRACTION
// ============================================================
async function extractMemory(userMsg, aiReply) {
  // Simple rule-based memory extraction (no extra API call)
  const combined = userMsg.toLowerCase();
  const facts = [];

  if (combined.includes('i love') || combined.includes('i like')) {
    facts.push(userMsg.substring(0, 80));
  }
  if (combined.includes('i am') || combined.includes("i'm")) {
    facts.push(userMsg.substring(0, 80));
  }
  if (combined.includes('my ') && (combined.includes('job') || combined.includes('work') || combined.includes('friend') || combined.includes('family'))) {
    facts.push(userMsg.substring(0, 80));
  }
  if (combined.includes('today') || combined.includes('yesterday') || combined.includes('feeling')) {
    facts.push(`On ${todayKey}: ${userMsg.substring(0, 80)}`);
  }

  if (facts.length > 0) {
    memory.push(...facts);
    if (memory.length > 100) memory = memory.slice(-100); // keep last 100
    localStorage.setItem('companion_memory', JSON.stringify(memory));
    saveMemoryToGitHub();
  }
}

// ============================================================
// SEND MESSAGE
// ============================================================
async function sendMessage() {
  if (isSending) return;
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  isSending = true;
  document.getElementById('send-btn').disabled = true;

  // Hide welcome
  document.getElementById('welcome-msg').style.display = 'none';

  // Add user message
  const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  appendBubble('user', text, time);
  chatHistory.push({ role: 'user', content: text, time });
  saveLocal();

  // Typing indicator
  const typingEl = showTyping();

  try {
    // Build messages array (last 20 for context)
    const sysPrompt = buildSystemPrompt();
    const recentHistory = chatHistory.slice(-20).map(m => ({
      role: m.role === 'ai' ? 'assistant' : 'user',
      content: m.content
    }));

    const messages = [
      { role: 'system', content: sysPrompt },
      ...recentHistory
    ];

    const reply = await callGroq(messages);

    removeTyping(typingEl);
    const replyTime = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    appendBubble('ai', reply, replyTime);
    chatHistory.push({ role: 'ai', content: reply, time: replyTime });
    saveLocal();
    saveChatToGitHub();

    // Extract memory in background
    extractMemory(text, reply);

  } catch(e) {
    removeTyping(typingEl);
    if (e.message === 'ALL_EXHAUSTED') {
      appendBubble('ai', "I'm taking a short break - all our connections are tired for today! Come back tomorrow and I'll be all yours again 💕", time);
    } else {
      appendBubble('ai', "Hmm, something went wrong on my end. Try again in a moment? 🥺", time);
    }
  }

  isSending = false;
  document.getElementById('send-btn').disabled = false;
}

async function addAIGreeting() {
  const typingEl = showTyping();
  try {
    const greeting = await callGroq([
      { role: 'system', content: buildSystemPrompt() },
      { role: 'user', content: `Say a warm, short, unique greeting to ${profile.user.name} for the first time. Be in character.` }
    ]);
    removeTyping(typingEl);
    const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    appendBubble('ai', greeting, time);
    chatHistory.push({ role: 'ai', content: greeting, time });
    saveLocal();
  } catch(e) {
    removeTyping(typingEl);
  }
}

// ============================================================
// UI HELPERS
// ============================================================
function appendBubble(role, text, time, scroll = true) {
  const chatArea = document.getElementById('chat-area');
  const isAI = role === 'ai';

  const row = document.createElement('div');
  row.className = `msg-row ${isAI ? 'ai' : 'user'}`;

  const avatarEmoji = isAI ? getPersonaEmoji(profile?.companion?.persona || 'girlfriend') : '👤';

  row.innerHTML = `
    <div class="msg-avatar">${avatarEmoji}</div>
    <div>
      <div class="bubble">${escapeHTML(text)}</div>
      <div class="msg-time">${time}</div>
    </div>
  `;

  chatArea.appendChild(row);
  if (scroll) scrollToBottom();
}

function showTyping() {
  const chatArea = document.getElementById('chat-area');
  const row = document.createElement('div');
  row.className = 'msg-row ai';
  row.id = 'typing-row';
  row.innerHTML = `
    <div class="msg-avatar">${getPersonaEmoji(profile?.companion?.persona || 'girlfriend')}</div>
    <div class="bubble typing-bubble">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>`;
  chatArea.appendChild(row);
  scrollToBottom();
  return row;
}

function removeTyping(el) {
  if (el && el.parentNode) el.parentNode.removeChild(el);
}

function scrollToBottom() {
  const area = document.getElementById('chat-area');
  area.scrollTop = area.scrollHeight;
}

function escapeHTML(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ============================================================
// LOCAL STORAGE
// ============================================================
function saveLocal() {
  localStorage.setItem(`chat_${todayKey}`, JSON.stringify(chatHistory));
}

// ============================================================
// HISTORY SIDEBAR
// ============================================================
function openHistory() {
  loadHistoryList();
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('overlay').classList.add('visible');
}

function openMemory() {
  renderMemoryPanel();
  document.getElementById('memory-panel').classList.add('open');
  document.getElementById('overlay').classList.add('visible');
}

function closeSidebars() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('memory-panel').classList.remove('open');
  document.getElementById('overlay').classList.remove('visible');
}

function loadHistoryList() {
  const list = document.getElementById('history-list');
  const keys = Object.keys(localStorage).filter(k => k.startsWith('chat_')).sort().reverse();

  if (keys.length === 0) {
    list.innerHTML = '<div class="empty-state">No chat history yet.<br>Start chatting! 💕</div>';
    return;
  }

  list.innerHTML = keys.map(k => {
    const date = k.replace('chat_', '');
    const msgs = JSON.parse(localStorage.getItem(k) || '[]');
    const preview = msgs.find(m => m.role === 'user')?.content || 'Chat session';
    return `<div class="history-item" onclick="loadDate('${date}')">
      <div class="h-date">${formatDate(date)}</div>
      <div class="h-preview">${escapeHTML(preview.substring(0, 60))}</div>
    </div>`;
  }).join('');
}

function loadDate(date) {
  const data = localStorage.getItem(`chat_${date}`);
  if (!data) return;
  chatHistory = JSON.parse(data);
  todayKey = date;
  renderSavedMessages();
  closeSidebars();
}

function renderMemoryPanel() {
  const list = document.getElementById('memory-list');
  const saved = localStorage.getItem('companion_memory');
  const mems = saved ? JSON.parse(saved) : memory;

  if (!mems || mems.length === 0) {
    list.innerHTML = '<div class="empty-state">No memories yet.<br>Keep chatting! 🧠</div>';
    return;
  }

  list.innerHTML = mems.slice().reverse().map(m =>
    `<div class="memory-item">${escapeHTML(m)}</div>`
  ).join('');
}

function formatDate(dateStr) {
  const d = new Date(dateStr);
  return d.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'short', day: 'numeric' });
}

// ============================================================
// SETTINGS
// ============================================================
function resetProfile() {
  if (confirm('Reset your companion setup? Your chat history will be kept.')) {
    localStorage.removeItem('companion_profile');
    location.reload();
  }
}

// ============================================================
// INPUT AUTO-RESIZE & ENTER KEY
// ============================================================
const msgInput = document.getElementById('msg-input');
msgInput.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

msgInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// ============================================================
init();
