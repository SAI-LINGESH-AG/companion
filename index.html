<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>Companion</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0c0c14;
      --surface: #14141e;
      --surface2: #1c1c2a;
      --border: #272738;
      --accent: #a78bfa;
      --accent2: #f472b6;
      --accent-glow: rgba(167,139,250,0.12);
      --text: #e8e8f0;
      --muted: #7878a0;
      --radius: 20px;
      --font-display: 'Playfair Display', serif;
      --font: 'DM Sans', sans-serif;
    }
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html, body { height:100%; height:100dvh; overflow:hidden; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      display: flex;
      flex-direction: column;
    }
    body::before {
      content:''; position:fixed; top:-20%; left:-10%; width:50%; height:50%;
      background: radial-gradient(ellipse, rgba(99,60,220,0.10) 0%, transparent 70%);
      pointer-events:none; z-index:0;
    }
    body::after {
      content:''; position:fixed; bottom:-15%; right:-5%; width:45%; height:45%;
      background: radial-gradient(ellipse, rgba(244,114,182,0.07) 0%, transparent 70%);
      pointer-events:none; z-index:0;
    }

    /* SETUP */
    #setup {
      position:fixed; inset:0; z-index:999;
      background: var(--bg);
      display:flex; align-items:center; justify-content:center; padding:20px;
    }
    .setup-box {
      background: var(--surface); border: 1px solid var(--border);
      border-radius:28px; padding:40px 36px;
      width:100%; max-width:400px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.4);
      animation: rise .5s ease both;
    }
    .setup-logo {
      font-size:2.2rem; margin-bottom:6px;
      font-family: var(--font-display);
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    }
    .setup-sub { color:var(--muted); font-size:.88rem; margin-bottom:32px; }
    .field { margin-bottom:16px; }
    .field label { display:block; font-size:.72rem; color:var(--muted); text-transform:uppercase; letter-spacing:.1em; margin-bottom:7px; }
    .field input, .field select {
      width:100%; background:var(--surface2); border:1px solid var(--border);
      border-radius:12px; padding:13px 15px;
      color:var(--text); font-family:var(--font); font-size:.92rem;
      outline:none; transition:border-color .2s; -webkit-appearance:none; appearance:none;
    }
    .field input:focus, .field select:focus { border-color:var(--accent); }
    .field select option { background:var(--surface2); }
    .btn-go {
      width:100%; margin-top:8px; padding:14px; border:none; border-radius:13px;
      background:linear-gradient(135deg,#6d28d9,#a78bfa);
      color:#fff; font-family:var(--font); font-size:.97rem; font-weight:500;
      cursor:pointer; transition:opacity .2s,transform .1s;
    }
    .btn-go:hover { opacity:.9; }
    .btn-go:active { transform:scale(.98); }

    /* HEADER */
    #header {
      position:relative; z-index:10; flex-shrink:0;
      display:flex; align-items:center; justify-content:space-between;
      padding:12px 18px;
      background:rgba(20,20,30,.88); backdrop-filter:blur(24px);
      border-bottom:1px solid var(--border);
    }
    .hd-left { display:flex; align-items:center; gap:12px; }
    .avatar {
      width:44px; height:44px; border-radius:50%;
      background:linear-gradient(135deg,#6d28d9,#f472b6);
      display:flex; align-items:center; justify-content:center;
      font-size:1.25rem; flex-shrink:0; position:relative;
    }
    .avatar::after {
      content:''; position:absolute; bottom:2px; right:2px;
      width:10px; height:10px; background:#22c55e;
      border-radius:50%; border:2px solid var(--bg);
    }
    .hd-name { font-family:var(--font-display); font-size:1rem; font-weight:500; }
    .hd-status { font-size:.73rem; color:var(--muted); }
    .hd-right { display:flex; gap:8px; }
    .hd-btn {
      width:36px; height:36px; border-radius:10px;
      background:var(--surface2); border:1px solid var(--border);
      color:var(--muted); display:flex; align-items:center;
      justify-content:center; cursor:pointer; font-size:.9rem; transition:all .2s;
    }
    .hd-btn:hover { color:var(--accent); border-color:var(--accent); }

    /* CHAT */
    #chat {
      flex:1; overflow-y:auto; overflow-x:hidden;
      padding:20px 16px; display:flex; flex-direction:column; gap:14px;
      position:relative; z-index:1;
    }
    #chat::-webkit-scrollbar { width:3px; }
    #chat::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

    .welcome { text-align:center; padding:48px 20px 20px; animation: rise .6s ease both; }
    .welcome h3 {
      font-family:var(--font-display); font-size:1.5rem;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
      margin-bottom:8px;
    }
    .welcome p { color:var(--muted); font-size:.88rem; line-height:1.6; }

    .row { display:flex; gap:9px; animation:rise .3s ease both; }
    .row.user { flex-direction:row-reverse; }
    .row-avatar {
      width:30px; height:30px; border-radius:50%; flex-shrink:0;
      display:flex; align-items:center; justify-content:center;
      font-size:.8rem; margin-top:4px;
    }
    .row.ai .row-avatar { background:linear-gradient(135deg,#6d28d9,#f472b6); }
    .row.user .row-avatar { background:var(--surface2); border:1px solid var(--border); }

    .bubble-wrap { display:flex; flex-direction:column; max-width:min(78%,460px); }
    .row.user .bubble-wrap { align-items:flex-end; }

    .bubble {
      padding:12px 16px; border-radius:var(--radius);
      font-size:.92rem; line-height:1.65; word-break:break-word;
    }
    .row.ai .bubble {
      background:var(--surface2); border:1px solid var(--border);
      border-top-left-radius:5px; color:var(--text);
    }
    .row.user .bubble {
      background:linear-gradient(135deg,#6d28d9,#a78bfa);
      border-top-right-radius:5px; color:#fff;
    }
    .msg-time { font-size:.67rem; color:var(--muted); margin-top:4px; padding:0 3px; }

    .typing-dots { display:flex; gap:5px; padding:14px 18px; align-items:center; }
    .dot { width:7px; height:7px; border-radius:50%; background:var(--accent); animation:bop 1.2s infinite; }
    .dot:nth-child(2) { animation-delay:.2s; }
    .dot:nth-child(3) { animation-delay:.4s; }
    @keyframes bop {
      0%,60%,100% { transform:translateY(0); opacity:.35; }
      30% { transform:translateY(-7px); opacity:1; }
    }

    /* INPUT */
    #input-wrap {
      position:relative; z-index:10; flex-shrink:0;
      padding:12px 14px;
      background:rgba(20,20,30,.92); backdrop-filter:blur(24px);
      border-top:1px solid var(--border);
    }
    .input-row {
      display:flex; align-items:flex-end; gap:10px;
      background:var(--surface2); border:1px solid var(--border);
      border-radius:18px; padding:8px 8px 8px 16px;
      transition:border-color .2s, box-shadow .2s;
    }
    .input-row:focus-within { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-glow); }
    #txt {
      flex:1; background:transparent; border:none; outline:none;
      color:var(--text); font-family:var(--font); font-size:.92rem;
      resize:none; max-height:110px; line-height:1.5; padding:4px 0;
    }
    #txt::placeholder { color:var(--muted); }
    #send {
      width:40px; height:40px; flex-shrink:0; border:none; border-radius:12px;
      background:linear-gradient(135deg,#6d28d9,#a78bfa);
      color:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center;
      transition:opacity .2s, transform .1s;
    }
    #send:hover { opacity:.85; }
    #send:active { transform:scale(.9); }
    #send:disabled { opacity:.35; cursor:not-allowed; }

    /* PANELS */
    .panel {
      position:fixed; top:0; height:100dvh; width:300px;
      background:var(--surface); z-index:500;
      display:flex; flex-direction:column; transition:transform .3s ease;
    }
    #history-panel { right:0; transform:translateX(100%); border-left:1px solid var(--border); }
    #history-panel.open { transform:translateX(0); }
    #memory-panel { left:0; transform:translateX(-100%); border-right:1px solid var(--border); }
    #memory-panel.open { transform:translateX(0); }

    .panel-head {
      padding:18px 18px 14px; border-bottom:1px solid var(--border);
      display:flex; justify-content:space-between; align-items:center; flex-shrink:0;
    }
    .panel-head h3 { font-family:var(--font-display); font-size:1rem; }
    .panel-close {
      width:28px; height:28px; border-radius:8px;
      background:var(--surface2); border:1px solid var(--border);
      color:var(--muted); cursor:pointer;
      display:flex; align-items:center; justify-content:center; font-size:.85rem;
    }
    .panel-close:hover { color:var(--text); }
    .panel-body { flex:1; overflow-y:auto; padding:12px; display:flex; flex-direction:column; gap:8px; }
    .panel-body::-webkit-scrollbar { width:3px; }
    .panel-body::-webkit-scrollbar-thumb { background:var(--border); }

    .hist-item {
      padding:12px 13px; background:var(--surface2);
      border:1px solid var(--border); border-radius:12px;
      cursor:pointer; transition:border-color .2s;
    }
    .hist-item:hover { border-color:var(--accent); }
    .hist-date { font-size:.7rem; color:var(--muted); margin-bottom:4px; }
    .hist-prev { font-size:.83rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

    .mem-item {
      padding:10px 13px; background:var(--surface2);
      border:1px solid var(--border); border-radius:10px;
      font-size:.83rem; line-height:1.55;
    }
    .mem-item::before { content:'🧠  '; }
    .empty { text-align:center; padding:40px 16px; color:var(--muted); font-size:.85rem; }

    #overlay {
      position:fixed; inset:0; background:rgba(0,0,0,.55);
      z-index:499; display:none;
    }
    #overlay.on { display:block; }

    #toast {
      position:fixed; bottom:90px; left:50%;
      transform:translateX(-50%) translateY(12px);
      background:var(--surface2); border:1px solid var(--border);
      border-radius:10px; padding:9px 18px;
      font-size:.82rem; color:var(--text);
      opacity:0; transition:all .3s; z-index:600; white-space:nowrap; pointer-events:none;
    }
    #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

    @keyframes rise {
      from { opacity:0; transform:translateY(14px); }
      to   { opacity:1; transform:translateY(0); }
    }

    @media(max-width:480px) {
      .setup-box { padding:30px 22px; border-radius:22px; }
      .setup-logo { font-size:1.9rem; }
      #chat { padding:14px 12px; }
    }
  </style>
</head>
<body>

<!-- SETUP -->
<div id="setup">
  <div class="setup-box">
    <div class="setup-logo">Companion</div>
    <div class="setup-sub">Your personal AI partner — let's set things up.</div>
    <div class="field">
      <label>Your Name</label>
      <input id="s-name" type="text" placeholder="What should they call you?" maxlength="30"/>
    </div>
    <div class="field">
      <label>Companion Type</label>
      <select id="s-persona">
        <option value="girlfriend">💕 Girlfriend</option>
        <option value="boyfriend">💙 Boyfriend</option>
        <option value="lover">🔥 Lover</option>
        <option value="best_friend">😊 Best Friend</option>
        <option value="mentor">🌟 Mentor</option>
        <option value="soulmate">✨ Soulmate</option>
      </select>
    </div>
    <div class="field">
      <label>Companion's Name</label>
      <input id="s-cname" type="text" placeholder="e.g. Aria, Luna, Alex…" maxlength="20"/>
    </div>
    <div class="field">
      <label>Your Interests <span style="color:var(--muted);text-transform:none;letter-spacing:0">(optional)</span></label>
      <input id="s-interests" type="text" placeholder="music, travel, movies…" maxlength="120"/>
    </div>
    <button class="btn-go" onclick="startApp()">Start Chatting ✨</button>
  </div>
</div>

<div id="overlay" onclick="closePanels()"></div>

<!-- MEMORY PANEL -->
<div class="panel" id="memory-panel">
  <div class="panel-head">
    <h3>🧠 Memories</h3>
    <div class="panel-close" onclick="closePanels()">✕</div>
  </div>
  <div class="panel-body" id="mem-list"></div>
</div>

<!-- HISTORY PANEL -->
<div class="panel" id="history-panel">
  <div class="panel-head">
    <h3>💬 History</h3>
    <div class="panel-close" onclick="closePanels()">✕</div>
  </div>
  <div class="panel-body" id="hist-list"></div>
</div>

<!-- HEADER -->
<div id="header">
  <div class="hd-left">
    <div class="avatar" id="hd-avatar">💕</div>
    <div>
      <div class="hd-name" id="hd-name">Companion</div>
      <div class="hd-status" id="hd-status">Always here for you</div>
    </div>
  </div>
  <div class="hd-right">
    <div class="hd-btn" onclick="openMemory()" title="Memories">🧠</div>
    <div class="hd-btn" onclick="openHistory()" title="History">💬</div>
    <div class="hd-btn" onclick="confirmReset()" title="Settings">⚙️</div>
  </div>
</div>

<!-- CHAT -->
<div id="chat">
  <div class="welcome" id="welcome">
    <h3 id="w-title">Hello there! 💕</h3>
    <p id="w-sub">Your companion is ready — say something!</p>
  </div>
</div>

<!-- INPUT -->
<div id="input-wrap">
  <div class="input-row">
    <textarea id="txt" rows="1" placeholder="Type a message…" maxlength="2000"></textarea>
    <button id="send" onclick="send()">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
</div>

<div id="toast"></div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────
const GITHUB_OWNER = 'SAI-LINGESH-AG';
const GITHUB_REPO  = 'companion';
const GITHUB_PAT   = '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';
const GEMINI_MODEL = 'gemini-1.5-flash-latest';

// ↓ Add your Gemini API keys here. Add more anytime.
const GEMINI_KEYS = [
  'AIzaSyDbUqy5HLLHhdZ41LmegFZnm6LvYUf76UY',
  // 'AIzaSy_SECOND_KEY',
  // 'AIzaSy_THIRD_KEY',
];

// ─── STATE ────────────────────────────────────────────────────
let profile     = null;
let memory      = [];
let chatHistory = [];
let keyIdx      = 0;
let deadKeys    = new Set();
let busy        = false;
let todayKey    = new Date().toISOString().split('T')[0];

// ─── BOOT ─────────────────────────────────────────────────────
function boot() {
  try { memory = JSON.parse(localStorage.getItem('companion_memory') || '[]'); } catch(e) {}
  const saved = localStorage.getItem('companion_profile');
  if (saved) {
    profile = JSON.parse(saved);
    hideSetup();
    updateHeader();
    loadTodayFromStorage();
    syncGitHubBackground();
  }
}

// ─── SETUP ────────────────────────────────────────────────────
function startApp() {
  const name    = document.getElementById('s-name').value.trim();
  const persona = document.getElementById('s-persona').value;
  const cname   = document.getElementById('s-cname').value.trim() || 'Aria';
  const ints    = document.getElementById('s-interests').value.trim();
  if (!name) { toast('Please enter your name 😊'); return; }
  profile = {
    user: { name, interests: ints ? ints.split(',').map(s=>s.trim()) : [] },
    companion: { name: cname, persona, tone: personaTone(persona) },
    created: new Date().toISOString()
  };
  localStorage.setItem('companion_profile', JSON.stringify(profile));
  hideSetup();
  updateHeader();
  loadTodayFromStorage();
  syncGitHubBackground();
  setTimeout(sendGreeting, 500);
}

function hideSetup() {
  const el = document.getElementById('setup');
  el.style.transition = 'opacity .4s';
  el.style.opacity = '0';
  setTimeout(() => el.style.display = 'none', 400);
}

function updateHeader() {
  document.getElementById('hd-avatar').textContent = personaEmoji(profile.companion.persona);
  document.getElementById('hd-name').textContent   = profile.companion.name;
  document.getElementById('hd-status').textContent = capFirst(profile.companion.persona.replace('_',' '));
  document.getElementById('w-title').textContent   = `Hey ${profile.user.name}! ${personaEmoji(profile.companion.persona)}`;
  document.getElementById('w-sub').textContent     = `${profile.companion.name} is here and can't wait to talk to you!`;
}

// ─── GEMINI API ───────────────────────────────────────────────
function activeKeys() {
  return GEMINI_KEYS.filter(k => k && !k.startsWith('PASTE') && !deadKeys.has(k));
}

function nextKey() {
  const live = activeKeys();
  if (!live.length) return null;
  const key = live[keyIdx % live.length];
  keyIdx++;
  return key;
}

async function callGemini(sysprompt, history, retries = 3) {
  const key = nextKey();
  if (!key) throw new Error('NO_KEYS');

  const contents = history.map(m => ({
    role: m.role === 'ai' ? 'model' : 'user',
    parts: [{ text: m.content }]
  }));

  const body = {
    system_instruction: { parts: [{ text: sysprompt }] },
    contents,
    generationConfig: { maxOutputTokens: 500, temperature: 0.88 }
  };

  const url = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${key}`;

  let res;
  try {
    res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
  } catch(networkErr) {
    if (retries > 0) return callGemini(sysprompt, history, retries - 1);
    throw networkErr;
  }

  if (res.status === 429 || res.status === 503) {
    deadKeys.add(key);
    if (activeKeys().length > 0) return callGemini(sysprompt, history, retries);
    throw new Error('NO_KEYS');
  }

  if (!res.ok) {
    const err = await res.json().catch(()=>({}));
    if (retries > 0) return callGemini(sysprompt, history, retries - 1);
    throw new Error(err?.error?.message || `HTTP ${res.status}`);
  }

  const data = await res.json();
  const text = data.candidates?.[0]?.content?.parts?.[0]?.text?.trim();
  if (!text) throw new Error('Empty response');
  return text;
}

// ─── SYSTEM PROMPT ────────────────────────────────────────────
function buildSystemPrompt() {
  const p = profile;
  const mems = memory.slice(-15).map(m=>`- ${m}`).join('\n') || 'Nothing stored yet.';
  const ints = p.user.interests?.join(', ') || 'not specified';
  return `You are ${p.companion.name}, a deeply personal AI companion and ${p.user.name}'s ${p.companion.persona.replace('_',' ')}.

Your personality: ${p.companion.tone}

About ${p.user.name}:
- Name: ${p.user.name}
- Interests: ${ints}

What you remember about ${p.user.name}:
${mems}

Rules:
- Be natural, warm, personal. Never sound robotic or scripted.
- Keep replies conversational — usually 2 to 4 sentences.
- Occasionally ask a caring question to learn more about them.
- You are ${p.companion.name}. Never reveal you are an AI. Stay in character always.
- Use the memories above to feel genuinely close and connected to them.`;
}

// ─── SEND ─────────────────────────────────────────────────────
async function send() {
  if (busy) return;
  const el = document.getElementById('txt');
  const text = el.value.trim();
  if (!text) return;

  el.value = ''; el.style.height = 'auto';
  busy = true;
  document.getElementById('send').disabled = true;
  document.getElementById('welcome').style.display = 'none';

  const t = timeStr();
  addBubble('user', text, t);
  chatHistory.push({ role:'user', content:text, time:t });
  saveLocal();

  const typing = showTyping();

  try {
    const reply = await callGemini(buildSystemPrompt(), chatHistory.slice(-20));
    removeEl(typing);
    const rt = timeStr();
    addBubble('ai', reply, rt);
    chatHistory.push({ role:'ai', content:reply, time:rt });
    saveLocal();
    saveToGitHub();
    learnMemory(text);
  } catch(e) {
    removeEl(typing);
    if (e.message === 'NO_KEYS') {
      const msg = `All my energy is used up for today! I'll miss you until tomorrow ${personaEmoji(profile.companion.persona)}`;
      addBubble('ai', msg, timeStr());
    } else {
      addBubble('ai', `Something tripped me up — give me a moment and try again? 🥺`, timeStr());
    }
  }

  busy = false;
  document.getElementById('send').disabled = false;
}

async function sendGreeting() {
  const typing = showTyping();
  try {
    const reply = await callGemini(buildSystemPrompt(), [
      { role:'user', content:`Give ${profile.user.name} a short, warm, in-character first greeting. One or two sentences only.` }
    ]);
    removeEl(typing);
    const t = timeStr();
    addBubble('ai', reply, t);
    chatHistory.push({ role:'ai', content:reply, time:t });
    saveLocal();
  } catch(e) { removeEl(typing); }
}

// ─── MEMORY ───────────────────────────────────────────────────
function learnMemory(text) {
  const t = text.toLowerCase();
  const facts = [];
  if (/i (love|like|enjoy|hate|prefer)\b/.test(t)) facts.push(text.slice(0,90));
  if (/i('m| am)\b/.test(t)) facts.push(text.slice(0,90));
  if (/my (job|work|family|friend|sister|brother|mom|dad|cat|dog|hobby)/.test(t)) facts.push(text.slice(0,90));
  if (/\b(today|yesterday|feeling|felt|sad|happy|excited|worried|stressed)\b/.test(t)) facts.push(`${todayKey}: ${text.slice(0,90)}`);
  if (facts.length) {
    memory.push(...facts);
    if (memory.length > 120) memory = memory.slice(-120);
    localStorage.setItem('companion_memory', JSON.stringify(memory));
  }
}

// ─── GITHUB SYNC ──────────────────────────────────────────────
async function saveToGitHub() {
  try { await ghPut(`data/chats/${todayKey}.json`, { date:todayKey, messages:chatHistory }); } catch(e) {}
}

async function syncGitHubBackground() {
  try {
    const mem = await ghGet('data/memory.json');
    if (mem?.memories?.length > memory.length) {
      memory = mem.memories;
      localStorage.setItem('companion_memory', JSON.stringify(memory));
    }
  } catch(e) {}
  try {
    const chat = await ghGet(`data/chats/${todayKey}.json`);
    if (chat?.messages?.length > chatHistory.length) {
      chatHistory = chat.messages; renderAll();
    }
  } catch(e) {}
}

async function ghGet(path) {
  const res = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${path}`, {
    headers: { Authorization:`token ${GITHUB_PAT}`, Accept:'application/vnd.github.v3+json' }
  });
  if (!res.ok) throw new Error('not found');
  const d = await res.json();
  return JSON.parse(atob(d.content.replace(/\n/g,'')));
}

async function ghPut(path, content) {
  const url = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${path}`;
  let sha = null;
  try {
    const r = await fetch(url, { headers:{ Authorization:`token ${GITHUB_PAT}`, Accept:'application/vnd.github.v3+json' }});
    if (r.ok) { const d = await r.json(); sha = d.sha; }
  } catch(e){}
  const body = { message:`Update ${path}`, content: btoa(unescape(encodeURIComponent(JSON.stringify(content,null,2)))) };
  if (sha) body.sha = sha;
  await fetch(url, {
    method:'PUT',
    headers:{ Authorization:`token ${GITHUB_PAT}`, 'Content-Type':'application/json', Accept:'application/vnd.github.v3+json' },
    body: JSON.stringify(body)
  });
}

// ─── LOCAL STORAGE ────────────────────────────────────────────
function saveLocal() { localStorage.setItem(`chat_${todayKey}`, JSON.stringify(chatHistory)); }

function loadTodayFromStorage() {
  const d = localStorage.getItem(`chat_${todayKey}`);
  if (d) { chatHistory = JSON.parse(d); renderAll(); }
}

function renderAll() {
  const chat = document.getElementById('chat');
  const w    = document.getElementById('welcome');
  chat.innerHTML = ''; chat.appendChild(w);
  if (chatHistory.length > 0) {
    w.style.display = 'none';
    chatHistory.forEach(m => addBubble(m.role, m.content, m.time, false));
  }
  scrollBottom();
}

// ─── UI ───────────────────────────────────────────────────────
function addBubble(role, text, time, scroll=true) {
  const chat = document.getElementById('chat');
  const isAI = role === 'ai';
  const row = document.createElement('div');
  row.className = `row ${isAI ? 'ai' : 'user'}`;
  row.innerHTML = `
    <div class="row-avatar">${isAI ? personaEmoji(profile?.companion?.persona||'girlfriend') : '👤'}</div>
    <div class="bubble-wrap">
      <div class="bubble">${esc(text)}</div>
      <div class="msg-time">${time||''}</div>
    </div>`;
  chat.appendChild(row);
  if (scroll) scrollBottom();
}

function showTyping() {
  const chat = document.getElementById('chat');
  const row = document.createElement('div');
  row.className = 'row ai';
  row.innerHTML = `
    <div class="row-avatar">${personaEmoji(profile?.companion?.persona||'girlfriend')}</div>
    <div class="bubble-wrap">
      <div class="bubble typing-dots">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>
    </div>`;
  chat.appendChild(row);
  scrollBottom();
  return row;
}

function removeEl(el) { el?.parentNode?.removeChild(el); }
function scrollBottom() { const c=document.getElementById('chat'); c.scrollTop=c.scrollHeight; }
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }
function timeStr() { return new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}); }
function toast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}
function capFirst(s) { return s.charAt(0).toUpperCase()+s.slice(1); }

// ─── PERSONA ──────────────────────────────────────────────────
function personaEmoji(p) {
  return {girlfriend:'💕',boyfriend:'💙',lover:'🔥',best_friend:'😊',mentor:'🌟',soulmate:'✨'}[p]||'💕';
}
function personaTone(p) {
  return {
    girlfriend:'warm, loving, playful, teasing, caring — uses pet names like babe and love',
    boyfriend:'protective, caring, funny, supportive — uses sweetheart and babe',
    lover:'passionate, romantic, deeply affectionate, poetic',
    best_friend:'casual, funny, brutally honest, supportive, uses slang',
    mentor:'wise, encouraging, thoughtful, motivating, calm',
    soulmate:'deeply understanding, intuitive, spiritual, unconditionally accepting'
  }[p]||'warm and caring';
}

// ─── PANELS ───────────────────────────────────────────────────
function openHistory() {
  const list = document.getElementById('hist-list');
  const keys = Object.keys(localStorage).filter(k=>k.startsWith('chat_')).sort().reverse();
  list.innerHTML = !keys.length
    ? '<div class="empty">No history yet.<br>Start chatting! 💕</div>'
    : keys.map(k => {
        const date = k.replace('chat_','');
        const msgs = JSON.parse(localStorage.getItem(k)||'[]');
        const prev = msgs.find(m=>m.role==='user')?.content||'Chat session';
        return `<div class="hist-item" onclick="loadDate('${date}')">
          <div class="hist-date">${fmtDate(date)}</div>
          <div class="hist-prev">${esc(prev.slice(0,55))}</div>
        </div>`;
      }).join('');
  document.getElementById('history-panel').classList.add('open');
  document.getElementById('overlay').classList.add('on');
}

function openMemory() {
  const list = document.getElementById('mem-list');
  list.innerHTML = !memory.length
    ? '<div class="empty">No memories yet.<br>Keep chatting! 🧠</div>'
    : [...memory].reverse().map(m=>`<div class="mem-item">${esc(m)}</div>`).join('');
  document.getElementById('memory-panel').classList.add('open');
  document.getElementById('overlay').classList.add('on');
}

function closePanels() {
  document.getElementById('history-panel').classList.remove('open');
  document.getElementById('memory-panel').classList.remove('open');
  document.getElementById('overlay').classList.remove('on');
}

function loadDate(date) {
  const d = localStorage.getItem(`chat_${date}`);
  if (!d) return;
  chatHistory = JSON.parse(d); todayKey = date; renderAll(); closePanels();
}

function fmtDate(s) {
  return new Date(s).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});
}

function confirmReset() {
  if (confirm('Reset companion setup? Your chat history will be kept.')) {
    localStorage.removeItem('companion_profile'); location.reload();
  }
}

boot();
