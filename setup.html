<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Create Your Companion — Soulmate</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="setup-wrap">
  <div class="setup-card">

    <div class="setup-header">
      <div style="font-size:2.2rem;margin-bottom:0.5rem">✨</div>
      <h2>Create Your Companion</h2>
      <p>Tell us about the person you'd like to connect with</p>
    </div>

    <div class="setup-form">

      <div class="form-group">
        <label>Companion's Name</label>
        <input type="text" id="compName" placeholder="e.g. Priya, Arjun, Mom, Grandpa…" maxlength="30" />
      </div>

      <div class="form-group">
        <label>Relationship Type</label>
        <div class="type-grid" id="typeGrid">
          <div class="type-card" data-type="romantic" onclick="selectType(this)">
            <div class="type-icon">💕</div>
            <div class="type-label">Romantic Partner</div>
          </div>
          <div class="type-card" data-type="family" onclick="selectType(this)">
            <div class="type-icon">👨‍👩‍👧</div>
            <div class="type-label">Family Member</div>
          </div>
          <div class="type-card" data-type="deceased" onclick="selectType(this)">
            <div class="type-icon">🕊️</div>
            <div class="type-label">Loved One (Passed)</div>
          </div>
          <div class="type-card" data-type="friend" onclick="selectType(this)">
            <div class="type-icon">🤝</div>
            <div class="type-label">Friend / General</div>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label>Describe them <span style="color:var(--text3);font-weight:400">(optional but helps a lot)</span></label>
        <textarea id="compDesc" placeholder="e.g. She was warm, funny, always knew what to say. She loved cooking and used to call me every Sunday…" rows="4"></textarea>
      </div>

      <p class="err-msg" id="setupErr"></p>
      <button class="btn-primary" onclick="saveCompanion()">Begin Conversation →</button>

    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, setDoc, getDoc }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_PROJECT.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId: "YOUR_APP_ID"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  let currentUser = null;

  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = "index.html"; return; }
    currentUser = user;
    const snap = await getDoc(doc(db, "companions", user.uid));
    if (snap.exists()) { window.location.href = "chat.html"; }
  });

  let selectedType = null;

  window.selectType = (el) => {
    document.querySelectorAll(".type-card").forEach(c => c.classList.remove("selected"));
    el.classList.add("selected");
    selectedType = el.dataset.type;
  };

  window.saveCompanion = async () => {
    const name = document.getElementById("compName").value.trim();
    const desc = document.getElementById("compDesc").value.trim();
    const err  = document.getElementById("setupErr");
    err.textContent = "";

    if (!name) { err.textContent = "Please enter a name for your companion."; return; }
    if (!selectedType) { err.textContent = "Please select a relationship type."; return; }

    try {
      await setDoc(doc(db, "companions", currentUser.uid), {
        name,
        type: selectedType,
        description: desc,
        user_name: currentUser.displayName || "friend",
        createdAt: Date.now()
      });
      window.location.href = "chat.html";
    } catch(e) {
      err.textContent = "Could not save. Please try again.";
    }
  };
</script>
</body>
</html>
